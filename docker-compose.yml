# version: '3.8'

networks:
  ai_network:
    driver: bridge

services:
  # ============================================
  # DATABASE
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - ai_network
    restart: unless-stopped

  # ============================================
  # REDIS
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - ai_network
    restart: unless-stopped

  # ============================================
  # OLLAMA — LOCAL LLM INFERENCE
  # ============================================
  #ollama:
  #
  #image: ollama/ollama:latest
  #  container_name: ollama
  #  ports:
  #    - "11434:11434"
  #  environment:
  #    - OLLAMA_NUM_PARALLEL=1
  #    - OLLAMA_MAX_LOADED_MODELS=1
  #    - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-30m}
  #  volumes:
  #    - ./ollama-models:/root/.ollama
  #    - ./ollama-init/entrypoint.sh:/entrypoint.sh:ro
  #  networks:
  #    - ai_network
  #  restart: unless-stopped
  #  entrypoint: ["/bin/bash", "/entrypoint.sh"]
  #  deploy:
  #    resources:
  #      limits:
  #        memory: 8G
  #      reservations:
  #        memory: 4G

  # ============================================
  # MCP SERVER
  # ============================================
  mcp-server:
    build: ./mcp-server
    container_name: mcp-server
    ports:
      - "3333:3333"
    environment:
      - WAZUH_API_URL=${WAZUH_API_URL}
      - WAZUH_API_USER=${WAZUH_API_USER}
      - WAZUH_API_PASSWORD=${WAZUH_API_PASSWORD}
      - WAZUH_INDEXER_URL=${WAZUH_INDEXER_URL}
      - WAZUH_INDEXER_USER=${WAZUH_INDEXER_USER}
      - WAZUH_INDEXER_PASSWORD=${WAZUH_INDEXER_PASSWORD}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    networks:
      - ai_network
    restart: unless-stopped

  # ============================================
  # N8N - WORKFLOW AUTOMATION
  # ============================================
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_SECURE_COOKIE=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=your-encryption-key-here
      - WEBHOOK_URL=http://AI_LAB_IP:5678/
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    #  - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
    #  - OLLAMA_MODEL=${OLLAMA_MODEL}
      - EXECUTIONS_TIMEOUT=600
      - EXECUTIONS_TIMEOUT_MAX=600
    volumes:
      - ./n8n-workflows:/home/node/.n8n
    networks:
      - ai_network
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - mcp-server
    #  - ollama

  # ============================================
  # AI AGENT (future automation)
  # ============================================
  ai-agent:
    build: ./ai-agent
    container_name: ai-agent
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WAZUH_API_URL=${WAZUH_API_URL}
      - WAZUH_API_USER=${WAZUH_API_USER}
      - WAZUH_API_PASSWORD=${WAZUH_API_PASSWORD}
    networks:
      - ai_network
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
